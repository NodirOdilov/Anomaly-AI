name: landing-ci

on:
  push:
    paths:
      - "landing/**"
      - ".github/workflows/landing-ci.yml"
  pull_request:
    paths:
      - "landing/**"
      - ".github/workflows/landing-ci.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: landing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: landing/package-lock.json
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build
