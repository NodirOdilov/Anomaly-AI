name: security

on:
  schedule:
    - cron: "0 6 * * 1"  # каждый понедельник, 06:00 UTC
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/security.yml"
      - "backend/Dockerfile"
      - "frontend/Dockerfile"

jobs:
  trivy-fs:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: "0"

  trivy-image-backend:
    name: Trivy image scan (backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t anomaly-ai-backend:ci ./backend

      - name: Trivy scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: anomaly-ai-backend:ci
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"
          format: table

  dependency-review:
    name: Dependency review (PR only)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
